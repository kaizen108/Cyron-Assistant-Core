# Production override: run API and bot from image only (no host volume mounts).
# Use: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
# This avoids host filesystem issues and ensures the same code as the image runs.

services:
  postgres:
    ports:
      - "127.0.0.1:5432:5432"
  redis:
    ports:
      - "127.0.0.1:6379:6379"
  api:
    volumes: []
    ports:
      - "127.0.0.1:8000:8000"
  bot:
    volumes: []
