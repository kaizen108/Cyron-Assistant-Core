services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - .env 
    ports:
      - "80:8000"
    networks:
      - ai-ticket-network
    restart: unless-stopped

  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    env_file:
      - .env
    networks:
      - ai-ticket-network
    restart: unless-stopped

networks:
  ai-ticket-network:
    driver: bridge
